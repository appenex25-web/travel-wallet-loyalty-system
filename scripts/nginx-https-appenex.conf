# Nginx config for https://appenex.org and https://www.appenex.org
# Copy to /etc/nginx/sites-available/appenex.conf, enable, then run certbot.
# Replace DEPLOY_PATH with your path (e.g. /opt/travel-wallet-loyalty-system).

server {
    listen 80;
    listen [::]:80;
    server_name appenex.org www.appenex.org;
    root /opt/travel-wallet-loyalty-system/web-dist;
    index index.html;

    # Let's Encrypt challenge (certbot will use this)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    # API proxy to backend
    location ~ ^/(auth|users|customers|pos|admin|uploads|messages|bookings|campaigns|posts|catalog|qr|points|wallet) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # SPA: serve static files, fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# After running certbot, it will add a server { listen 443 ssl; ... } block.
# If you prefer to add SSL yourself, duplicate the above server block, change listen to 443 ssl,
# and add: ssl_certificate /etc/letsencrypt/live/appenex.org/fullchain.pem;
#         ssl_certificate_key /etc/letsencrypt/live/appenex.org/privkey.pem;
