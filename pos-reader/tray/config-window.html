<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Travel Wallet — Server URL</title>
  <style>
    body { font-family: system-ui, sans-serif; padding: 20px; min-width: 360px; }
    label { display: block; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 8px; margin-bottom: 16px; box-sizing: border-box; }
    button { padding: 8px 16px; background: #1a1a2e; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #16213e; }
    p { color: #666; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <p>Enter your Travel Wallet server API URL. The admin will load from this PC so NFC reader works.</p>
  <label for="url">API URL</label>
  <input type="url" id="url" placeholder="http://45.76.31.105:3000" value="">
  <button type="button" id="save">Save and open admin</button>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById('url').value = params.get('current') || '';
    const { ipcRenderer } = require('electron');
    document.getElementById('save').onclick = () => {
      const url = document.getElementById('url').value.trim();
      if (url) ipcRenderer.send('server-url', url);
    };
  </script>
</body>
</html>
