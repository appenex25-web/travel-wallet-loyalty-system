name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build web app
        run: |
          cd web
          npm ci
          if [ -n "${{ secrets.API_URL }}" ]; then
            echo "VITE_API_URL=${{ secrets.API_URL }}" > .env.production
          else
            echo "VITE_API_URL=http://${{ secrets.SERVER_IP }}:3000" > .env.production
          fi
          npm run build

      - name: Deploy web app to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/travel-wallet-loyalty-system}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p $DEPLOY_PATH/web-dist"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r web/dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_PATH/web-dist/

      - name: Pack backend and config for server
        run: |
          tar --exclude=backend/node_modules --exclude=backend/dist --exclude=.git -cf deploy.tar backend docker-compose.yml .env.production.example

      - name: Deploy backend on server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/travel-wallet-loyalty-system}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.tar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_PATH/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd $DEPLOY_PATH && tar -xf deploy.tar && rm -f deploy.tar && docker compose build backend && docker compose up -d && sleep 15 && docker compose exec -T backend node scripts/run-booking-migration.js || true"

      - name: Set API_BASE_URL on server (so add hotel / CORS works)
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/travel-wallet-loyalty-system}"
          if [ -z "$API_URL" ]; then echo "No API_URL secret; skip setting API_BASE_URL"; exit 0; fi
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd $DEPLOY_PATH && (grep -q '^API_BASE_URL=' .env 2>/dev/null && sed -i.bak 's|^API_BASE_URL=.*|API_BASE_URL=$API_URL|' .env || echo 'API_BASE_URL=$API_URL' >> .env) && docker compose up -d backend"

      - name: Sync Nginx config (appenex.conf)
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no scripts/appenex.conf.FULL-REFERENCE ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/tmp/appenex.conf
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mv /tmp/appenex.conf /etc/nginx/sites-available/appenex.conf && ln -sf /etc/nginx/sites-available/appenex.conf /etc/nginx/sites-enabled/appenex.conf && nginx -t && systemctl reload nginx"

      - name: Verify /health endpoint via Nginx
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          set -e
          TARGET="${API_URL:-https://www.appenex.org}"
          echo "Checking $TARGET/health"
          curl -fsS -D /tmp/health-headers.txt -o /tmp/health-body.txt "$TARGET/health"
          if ! grep -qi 'content-type: application/json' /tmp/health-headers.txt; then
            echo "Unexpected Content-Type for /health:"
            cat /tmp/health-headers.txt
            echo ""
            echo "Body:"
            cat /tmp/health-body.txt
            exit 1
          fi
