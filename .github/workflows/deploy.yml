name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build web app
        run: |
          cd web
          npm ci
          if [ -n "${{ secrets.API_URL }}" ]; then
            echo "VITE_API_URL=${{ secrets.API_URL }}" > .env.production
          else
            echo "VITE_API_URL=http://${{ secrets.SERVER_IP }}:3000" > .env.production
          fi
          npm run build

      - name: Deploy web app to server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/travel-wallet-loyalty-system}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "mkdir -p $DEPLOY_PATH/web-dist"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r web/dist/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_PATH/web-dist/

      - name: Pack backend and config for server
        run: |
          tar --exclude=backend/node_modules --exclude=backend/dist --exclude=.git -cf deploy.tar backend docker-compose.yml .env.production.example

      - name: Deploy backend on server
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${DEPLOY_PATH:-/opt/travel-wallet-loyalty-system}"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no deploy.tar ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:$DEPLOY_PATH/
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "cd $DEPLOY_PATH && tar -xf deploy.tar && rm -f deploy.tar && docker compose build backend && docker compose up -d && sleep 15 && docker compose exec -T backend node scripts/run-booking-migration.js || true"
